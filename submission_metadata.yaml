  pre_computation_time_minutes: 38


methodology_summary: |
  Hybrid ranking pipeline using sentence-transformers (all-MiniLM-L6-v2)
  for semantic embeddings + FAISS ANN search across 100K candidates.
  Final score = semantic_similarity x behavioral_multiplier x career_quality.
  Behavioral signals (recency, notice period, response rate, open_to_work)
  act as a multiplier to down-weight ghost candidates. Career quality checks
  product vs consulting company ratio and shipping track record.
  Honeypot detection via timeline inconsistency checks flagged 9,264 candidates.
  Ranking step completes in 16.8s on CPU.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true